apiVersion: batch/v1
kind: CronJob
metadata:
  name: cliplot-readiness-monitor
  namespace: statex-apps
  labels:
    app: cliplot
    component: readiness-monitor
    managed-by: codex
spec:
  # Staggered off the :00/:30 marks shared by catalog-contract-monitor and
  # others. See shared/docs/DEPLOY_STANDARDIZATION_REPORT.md section 12 addendum.
  schedule: "19,49 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: cliplot-readiness-monitor
            component: readiness-monitor
            managed-by: codex
        spec:
          restartPolicy: Never
          containers:
            - name: readiness
              image: localhost:5000/cliplot:latest
              imagePullPolicy: Always
              command:
                - node
                - scripts/k8s-readiness-probe.js
                - http://cliplot:8080
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "25m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
