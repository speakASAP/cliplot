apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cliplot
  namespace: statex-apps
  labels:
    app: cliplot
    managed-by: codex
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - cliplot.alfares.cz
      secretName: cliplot-tls
  rules:
    - host: cliplot.alfares.cz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cliplot
                port:
                  number: 8080
