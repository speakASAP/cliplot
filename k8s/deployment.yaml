apiVersion: apps/v1
kind: Deployment
metadata:
  name: cliplot-service
  namespace: statex-apps
  labels:
    app: cliplot-service
    managed-by: codex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cliplot-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: cliplot-service
    spec:
      containers:
        - name: app
          image: localhost:5000/cliplot-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: cliplot-service-config
            - secretRef:
                name: cliplot-service-secret
                optional: true
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "250m"
