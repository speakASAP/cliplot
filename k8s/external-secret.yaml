apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cliplot-secret
  namespace: statex-apps
  labels:
    app: cliplot
    managed-by: codex
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cliplot-secret
    creationPolicy: Owner
  data:
    - secretKey: CATALOG_INTERNAL_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/auth-microservice
        property: CATALOG_INTERNAL_SERVICE_TOKEN
    - secretKey: ORDERS_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/cliplot
        property: ORDERS_SERVICE_TOKEN
    - secretKey: WAREHOUSE_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/cliplot
        property: WAREHOUSE_SERVICE_TOKEN
    - secretKey: NOTIFICATIONS_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/cliplot
        property: NOTIFICATIONS_SERVICE_TOKEN
    - secretKey: PAYMENT_API_KEY
      remoteRef:
        key: secret/prod/cliplot
        property: PAYMENT_API_KEY
    - secretKey: PAYMENT_WEBHOOK_API_KEY
      remoteRef:
        key: secret/prod/cliplot
        property: PAYMENT_WEBHOOK_API_KEY
    - secretKey: CLIPLOT_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/cliplot
        property: CLIPLOT_SERVICE_TOKEN
    - secretKey: DOCS_RAG_SERVICE_TOKEN
      remoteRef:
        key: secret/prod/cliplot
        property: DOCS_RAG_SERVICE_TOKEN
