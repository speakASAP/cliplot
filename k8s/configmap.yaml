apiVersion: v1
kind: ConfigMap
metadata:
  name: cliplot-service-config
  namespace: statex-apps
  labels:
    app: cliplot-service
    managed-by: codex
data:
  NODE_ENV: "production"
  PORT: "8080"
  SERVICE_NAME: "cliplot-service"
  DOMAIN: "cliplot.alfares.cz"
  CORS_ORIGIN: "https://cliplot.alfares.cz"
  CATALOG_SERVICE_URL: "http://catalog-microservice:3200"
  PAYMENT_SERVICE_URL: "http://payments-microservice:3468"
  NOTIFICATION_SERVICE_URL: "http://notifications-microservice:3368"
  WAREHOUSE_SERVICE_URL: "http://warehouse-microservice:3201"
  ORDERS_SERVICE_URL: "http://orders-microservice:3203"
  AUTH_SERVICE_URL: "http://auth-microservice:3370"
  LOGGING_SERVICE_URL: "http://logging-microservice:3367"
  CLIPLOT_FRONTEND_MODE: "frontend-foundation"
