apiVersion: v1
kind: ConfigMap
metadata:
  name: cliplot-service-config
  namespace: statex-apps
  labels:
    app: cliplot-service
    managed-by: codex
data:
  NODE_ENV: "production"
  PORT: "8080"
  SERVICE_NAME: "cliplot-service"
  DOMAIN: "cliplot.alfares.cz"
  CORS_ORIGIN: "https://cliplot.alfares.cz"
  CATALOG_SERVICE_URL: "http://catalog-microservice:3200"
  PAYMENT_SERVICE_URL: "http://payments-microservice:3468"
  NOTIFICATION_SERVICE_URL: "http://notifications-microservice:3368"
  WAREHOUSE_SERVICE_URL: "http://warehouse-microservice:3201"
  ORDERS_SERVICE_URL: "http://orders-microservice:3203"
  AUTH_SERVICE_URL: "http://auth-microservice:3370"
  LOGGING_SERVICE_URL: "http://logging-microservice:3367"
  CLIPLOT_FRONTEND_MODE: "shared-service-integration"
  CLIPLOT_APPLICATION_ID: "cliplot-service"
  CLIPLOT_ORDER_CHANNEL: "cliplot"
  CLIPLOT_CHANNEL_ACCOUNT_ID: "cliplot-storefront"
  ENABLE_LIVE_ORDER_SUBMIT: "false"
  AUTH_PUBLIC_URL: "https://auth.alfares.cz"
  AUTH_CLIENT_ID: "cliplot-service"
  AUTH_RETURN_URL: "https://cliplot.alfares.cz/auth/callback"
  ORDERS_CREATE_PATH: "/api/orders"
  CLIPLOT_ORDER_ID_PREFIX: "cliplot"
  SERVICE_REQUEST_TIMEOUT_MS: "2200"
